name: clear_task
description: A new Flutter project to manage and organize your tasks.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hugeicons: ^0.0.11
  flutter_launcher_icons: ^0.14.3
  lottie: ^3.2.0
  flutter_bloc: ^9.1.1
  get: ^4.7.2
  intl: ^0.20.2
  sqflite: ^2.4.1
  path: ^1.9.0
  shared_preferences: ^2.5.3
  timezone: ^0.10.1
  flutter_local_notifications: ^19.5.0
  google_fonts: ^6.3.3
  google_mobile_ads: ^7.0.0
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^6.0.0
  fl_chart: ^1.2.0
  url_launcher: ^6.3.2
  # Cloud sync & auth
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  google_sign_in: ^6.2.2
  connectivity_plus: ^6.1.4
  # Google Calendar
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  smooth_page_indicator: ^2.0.1
  flutter_quill: ^11.0.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  bloc_concurrency: ^0.3.0
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
    - assets/illustration/
    - assets/animations/
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/clear_task_icon.jpg"
  min_sdk_android: 21
  adaptive_icon_foreground: "assets/icons/clear_task_icon.jpg"
  adaptive_icon_background: "#111111"