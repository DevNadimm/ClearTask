name: clear_task
description: A new Flutter project to manage and organize your tasks.
publish_to: 'none' # Prevents accidental publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  hugeicons: ^0.0.11

  # State management
  flutter_bloc: ^9.1.1
  get: ^4.7.2

  # Date & time formatting
  intl: ^0.20.2

  # Local database
  sqflite: ^2.4.1
  path: ^1.9.0

  # Persistent storage
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/