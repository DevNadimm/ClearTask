name: clear_task
description: A new Flutter project to manage and organize your tasks.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  hugeicons: ^0.0.11
  flutter_launcher_icons: ^0.14.3
  lottie: ^3.2.0
  awesome_snackbar_content:

  # State Management
  flutter_bloc: ^9.1.1
  get: ^4.7.2

  # Date & Time Formatting
  intl: ^0.20.2

  # Local Database
  sqflite: ^2.4.1
  path: ^1.9.0

  # Persistent Storage
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/illustration/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.jpg"
  min_sdk_android: 21
  adaptive_icon_foreground: "assets/icons/app_icon.jpg"
  adaptive_icon_background: "#ffffff"