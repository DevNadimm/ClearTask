name: clear_task
description: A new Flutter project to manage and organize your tasks.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hugeicons: ^0.0.11
  flutter_launcher_icons: ^0.14.3
  lottie: ^3.2.0
  flutter_bloc: ^9.1.1
  get: ^4.7.2
  intl: ^0.20.2
  sqflite: ^2.4.1
  path: ^1.9.0
  shared_preferences: ^2.5.3
  timezone: ^0.10.1
  flutter_local_notifications: ^19.5.0
  google_fonts: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/illustration/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/clear_task_icon.jpg"
  min_sdk_android: 21
  adaptive_icon_foreground: "assets/icons/clear_task_icon.jpg"
  adaptive_icon_background: "#111111"